<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Express - Uber UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        :root {
            --color-principal: #FFD700;
            --color-fondo: #1a1a1a;
            --color-panel: #222222;
            --color-texto: #ffffff;
            --color-input-bg: #333333;
        }

        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; background: var(--color-fondo); }

        #map { height: 100vh; width: 100%; z-index: 1; background: #222; }
        .leaflet-tile-container { filter: grayscale(80%) brightness(0.7) contrast(1.1); }
        .leaflet-routing-polyline, .leaflet-marker-pane { z-index: 999; }

        /* PANEL INPUTS */
        .panel-inputs {
            position: absolute; top: 20px; left: 20px; width: 90%; max-width: 360px;
            background: var(--color-panel); color: var(--color-texto); z-index: 2000;
            padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; border-top: 4px solid var(--color-principal);
            transition: transform 0.5s ease, opacity 0.5s ease; max-height: 90vh; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
        }
        .panel-inputs.hidden { transform: translateY(150vh); opacity: 0; pointer-events: none; }

        h2 { margin: 0 0 10px 0; font-size: 1.2rem; font-weight: 800; text-align: center; text-transform: uppercase; color: var(--color-principal); letter-spacing: 1px; }

        .input-group { position: relative; width: 100%; }
        .input-icon { position: absolute; top: 50%; left: 15px; transform: translateY(-50%); color: var(--color-principal); font-size: 14px; z-index: 10; }

        .input-uber {
            width: 100%; box-sizing: border-box; padding: 16px 10px 16px 45px;
            border: 1px solid transparent; border-radius: 8px; background: var(--color-input-bg); color: white;
            font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.95rem; outline: none; transition: 0.2s;
        }
        .input-uber:focus { border-color: var(--color-principal); background: #2a2a2a; }
        .input-loading { background-image: url('https://i.gifer.com/ZZ5H.gif'); background-repeat: no-repeat; background-position: right 10px center; background-size: 20px; }

        /* --- LISTA COMPARTIDA (UBER STYLE) --- */
        #lista-compartida {
            list-style: none; padding: 0; margin: 5px 0;
            background: transparent;
            max-height: 250px; overflow-y: auto;
            display: none; /* Se muestra al escribir */
        }
        #lista-compartida li {
            padding: 12px 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            display: flex; align-items: center; gap: 12px;
        }
        #lista-compartida li:hover { background: #2a2a2a; }
        
        .result-icon { 
            background: #333; width: 32px; height: 32px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #ccc; font-size: 0.8rem; flex-shrink: 0;
        }
        .result-text { display: flex; flex-direction: column; }
        .result-title { font-weight: 700; font-size: 0.9rem; color: white; }
        .result-sub { font-size: 0.75rem; color: #888; margin-top: 2px; }

        /* --- SKELETON LOADING --- */
        .skeleton-item { padding: 12px 10px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .skeleton-icon { width: 32px; height: 32px; border-radius: 50%; background: #333; flex-shrink: 0; animation: shimmer 1.5s infinite linear; }
        .skeleton-text-group { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }
        .skeleton-line-long { height: 12px; width: 70%; background: #333; border-radius: 4px; animation: shimmer 1.5s infinite linear; }
        .skeleton-line-short { height: 10px; width: 40%; background: #333; border-radius: 4px; animation: shimmer 1.5s infinite linear; }

        @keyframes shimmer {
            0% { background-color: #333; }
            50% { background-color: #444; }
            100% { background-color: #333; }
        }

        /* HISTORIAL */
        .historial-box { display: none; margin-top: 5px; font-size: 0.8rem; color: #aaa; text-align: left; padding-left: 5px; }
        .historial-link { color: var(--color-principal); text-decoration: underline; cursor: pointer; font-weight: 600; margin-left: 5px; }

        /* BOTONES */
        .btn-accion { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: 800; font-family: 'Montserrat', sans-serif; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1rem; transition: 0.2s; text-transform: uppercase; }
        .btn-calcular { background-color: var(--color-principal); color: black; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2); }
        .btn-calcular:active { transform: scale(0.98); }
        .btn-whatsapp { background-color: var(--color-whatsapp); color: white; }
        .btn-volver { background-color: #333; color: #aaa; font-size: 0.9rem; }

        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 215, 0, 0.3); border-radius: 50%; border-top-color: var(--color-principal); animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* RESULTADOS */
        .panel-resultados {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 90%; max-width: 380px; background: var(--color-panel); color: white;
            z-index: 2000; padding: 25px; border-radius: 15px; border-top: 5px solid var(--color-principal);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8); text-align: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .panel-resultados.visible { transform: translateX(-50%) translateY(0); }
        .precio-grande { font-size: 2.2rem; font-weight: 900; margin: 5px 0; line-height: 1; }
        .precio-tachado { text-decoration: line-through; color: #444; font-size: 0.9rem; font-weight: 600; margin-top: 5px; }
        .badge-tarifa { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; background: rgba(0,0,0,0.1); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }

        @media (max-width: 600px) {
            .panel-inputs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; max-width: none; border-radius: 0; border: none; padding: 30px 20px; box-sizing: border-box; }
            .panel-resultados { bottom: 0; width: 100%; max-width: none; border-radius: 20px 20px 0 0; padding-bottom: 40px; }
        }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="color:white; margin-top:15px; font-weight:600;">Calculando ruta...</div>
    </div>

    <div id="panel-inputs" class="panel-inputs">
        <h2><i class="fas fa-taxi"></i> Taxi Express</h2>
        
        <div class="input-group">
            <i class="fas fa-car input-icon"></i>
            <input type="text" id="input-origen" class="input-uber" placeholder="Obteniendo ubicación..." autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-flag-checkered input-icon"></i>
            <input type="text" id="input-destino" class="input-uber" placeholder="¿A dónde vas?" autocomplete="off">
        </div>

        <ul id="lista-compartida"></ul>

        <div id="historial-container" class="historial-box">
            <i class="fas fa-history"></i> Último: <span id="historial-valor" class="historial-link"></span>
        </div>

        <button class="btn-accion btn-calcular" onclick="procesarCalculo()">
            ✅ CALCULAR PRECIO AHORA
        </button>
        
        <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
            <div style="font-size: 0.7rem; color: #666; margin-bottom: 5px;">COBERTURA:</div>
            <div style="font-size: 0.75rem; color: #aaa;">Río Cuarto • Las Higueras • Santa Catalina</div>
        </div>
    </div>

    <div id="panel-resultados" class="panel-resultados">
        <div style="background: var(--color-principal); color: black; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <div id="badge-tarifa" class="badge-tarifa">Cargando...</div>
            <div style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase;">Estimado (+0.4km)</div>
            <div id="precio-original" class="precio-tachado">$0.00</div>
            <div id="precio-final" class="precio-grande">$0.00</div>
            <div id="distancia-final" style="font-size: 0.8rem; font-weight: 700; margin-top: 5px;">0 km</div>
        </div>

        <button class="btn-accion btn-whatsapp" onclick="pedirPorWhatsapp()">
            <i class="fab fa-whatsapp" style="font-size: 1.3rem;"></i> PEDIR VIAJE
        </button>

        <button class="btn-accion btn-volver" onclick="volverAlFormulario()">VOLVER</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        const RIO_CUARTO_LAT = -33.1232;
        const RIO_CUARTO_LON = -64.3493;
        const SC_LAT = -33.205;
        const SC_LON = -64.440;

        var map = L.map('map', { zoomControl: false }).setView([RIO_CUARTO_LAT, RIO_CUARTO_LON], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM', maxZoom: 19 }).addTo(map);

        var coordOrigen = null;
        var coordDestino = null;
        var distanciaCalculada = 0; 
        
        // Variable para saber qué input se está editando
        var activeInputId = null;

        var controlRutas = L.Routing.control({
            waypoints: [], routeWhileDragging: false, addWaypoints: false, show: false,
            lineOptions: { styles: [{ color: 'white', opacity: 0.9, weight: 6 }] },
            createMarker: function(i, wp, nWps) {
                if (i === 0) return L.marker(wp.latLng, { icon: L.divIcon({ className: 'custom-div-icon', html: '<div class="map-icon-inner"><i class="fas fa-car-side"></i></div>', iconSize: [40, 40], iconAnchor: [20, 20] }) });
                else if (i === nWps - 1) return L.marker(wp.latLng, { icon: L.divIcon({ className: 'custom-div-icon', html: '<div class="map-icon-inner"><i class="fas fa-flag"></i></div>', iconSize: [40, 40], iconAnchor: [5, 35] }) });
                return null;
            }
        }).addTo(map);

        controlRutas.on('routesfound', function(e) {
            var resumen = e.routes[0].summary;
            let kmReales = resumen.totalDistance / 1000;
            distanciaCalculada = kmReales + 0.4;
            map.fitBounds(L.latLngBounds([coordOrigen, coordDestino]), { paddingTopLeft: [50, 50], paddingBottomRight: [50, 300] });
            document.getElementById('loader').style.display = 'none';
            calcularPrecio();
            document.getElementById('panel-inputs').classList.add('hidden');
            document.getElementById('panel-resultados').classList.add('visible');
        });

        function procesarCalculo() {
            if (!coordOrigen || !coordDestino) {
                alert("⚠️ ATENCIÓN: Debes seleccionar ambas direcciones.");
                return;
            }
            document.getElementById('loader').style.display = 'flex';
            controlRutas.setWaypoints([coordOrigen, coordDestino]);
        }

        // ============================================
        //  LÓGICA UNIFICADA DE AUTOCOMPLETADO
        // ============================================
        
        function inicializarInputs() {
            const inputOrigen = document.getElementById('input-origen');
            const inputDestino = document.getElementById('input-destino');
            const listaCompartida = document.getElementById('lista-compartida');

            // Asignar input activo al hacer foco
            inputOrigen.addEventListener('focus', () => { activeInputId = 'input-origen'; listaCompartida.style.display = 'none'; });
            inputDestino.addEventListener('focus', () => { activeInputId = 'input-destino'; listaCompartida.style.display = 'none'; });

            configurarInput(inputOrigen);
            configurarInput(inputDestino);
        }

        function configurarInput(inputElement) {
            let timeout = null;
            inputElement.addEventListener('input', function() {
                const query = this.value;
                const lista = document.getElementById('lista-compartida');
                
                if (query.length < 3) {
                    lista.style.display = 'none';
                    return;
                }

                clearTimeout(timeout);
                
                // Mostrar SKELETON mientras espera
                mostrarSkeleton(lista);
                
                timeout = setTimeout(() => { buscarEnArcGIS(query); }, 300);
            });
        }

        function mostrarSkeleton(lista) {
            lista.style.display = 'block';
            lista.innerHTML = ''; // Limpiar
            // Generar 3 items de skeleton
            for(let i=0; i<3; i++) {
                const li = document.createElement('li');
                li.style.pointerEvents = 'none'; // No clickable
                li.innerHTML = `
                    <div class="skeleton-icon"></div>
                    <div class="skeleton-text-group">
                        <div class="skeleton-line-long"></div>
                        <div class="skeleton-line-short"></div>
                    </div>
                `;
                lista.appendChild(li);
            }
        }

        async function buscarEnArcGIS(query) {
            const lista = document.getElementById('lista-compartida');
            const url = `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates?f=json&SingleLine=${encodeURIComponent(query)}&countryCode=ARG&location=${RIO_CUARTO_LON},${RIO_CUARTO_LAT}&distance=25000&maxLocations=20&outFields=PlaceName,Place_Addr,Match_addr,City`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                lista.innerHTML = ''; // Limpiar skeleton
                
                if (data.candidates && data.candidates.length > 0) {
                    const vistos = new Set();

                    data.candidates.forEach(item => {
                        const dist = calcularDistanciaKm(RIO_CUARTO_LAT, RIO_CUARTO_LON, item.location.y, item.location.x);
                        if (dist > 20) return; 

                        const attr = item.attributes;
                        let titulo = attr.PlaceName || "";
                        let subtitulo = attr.Place_Addr || attr.Match_addr || "";

                        if (!titulo) {
                            titulo = attr.Match_addr || item.address;
                            subtitulo = "Dirección";
                        }

                        // Parche Santa Catalina
                        const distSC = calcularDistanciaKm(SC_LAT, SC_LON, item.location.y, item.location.x);
                        if (distSC < 5) {
                            titulo = titulo.replace("Las Vertientes", "Santa Catalina").replace("Holmberg", "Santa Catalina");
                            subtitulo = subtitulo.replace("Las Vertientes", "Santa Catalina").replace("Holmberg", "Santa Catalina");
                            if (!subtitulo.includes("Santa Catalina")) subtitulo += ", Santa Catalina";
                        }

                        const claveUnica = (titulo + subtitulo).toLowerCase().trim();
                        if (vistos.has(claveUnica)) return;
                        vistos.add(claveUnica);

                        const li = document.createElement('li');
                        let iconoClass = attr.PlaceName ? 'fa-store' : 'fa-map-pin';
                        
                        li.innerHTML = `
                            <div class="result-icon"><i class="fas ${iconoClass}"></i></div>
                            <div class="result-text">
                                <span class="result-title">${titulo}</span>
                                <span class="result-sub">${subtitulo}</span>
                            </div>
                        `;
                        
                        li.onclick = () => {
                            // Llenar el input activo
                            const inputActivo = document.getElementById(activeInputId);
                            inputActivo.value = titulo;
                            lista.style.display = 'none'; // Desmontar lista
                            
                            const latlng = L.latLng(item.location.y, item.location.x);
                            
                            if (activeInputId === 'input-origen') {
                                coordOrigen = latlng;
                            } else {
                                coordDestino = latlng;
                                const datosAGuardar = { direccion: titulo, lat: item.location.y, lng: item.location.x };
                                localStorage.setItem('ultimoDestinoTaxi', JSON.stringify(datosAGuardar));
                                cargarHistorial();
                            }
                        };
                        lista.appendChild(li);
                    });
                } else {
                    lista.style.display = 'none';
                }
            } catch(e) { console.error(e); lista.style.display = 'none'; }
        }

        // --- Utils & Init ---
        function calcularDistanciaKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function obtenerUbicacionActual() {
            const inputOrigen = document.getElementById('input-origen');
            if ("geolocation" in navigator) {
                inputOrigen.classList.add('input-loading');
                const opcionesGPS = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };

                navigator.geolocation.getCurrentPosition(
                    async function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        coordOrigen = L.latLng(lat, lon);
                        map.setView([lat, lon], 16);
                        L.marker([lat, lon]).addTo(map).bindPopup("Tu ubicación").openPopup();

                        try {
                            const url = `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/reverseGeocode?f=json&featureTypes=&location=${lon},${lat}`;
                            const resp = await fetch(url);
                            const data = await resp.json();
                            if(data && data.address) {
                                let direccion = data.address.Address;
                                let ciudad = data.address.City;
                                const distSC = calcularDistanciaKm(SC_LAT, SC_LON, lat, lon);
                                if(distSC < 5 && (ciudad === "Las Vertientes" || ciudad === "Holmberg")) ciudad = "Santa Catalina";
                                if(ciudad) direccion += `, ${ciudad}`;
                                inputOrigen.value = direccion;
                            } else { inputOrigen.value = "Ubicación detectada"; }
                        } catch(e) { inputOrigen.value = "Mi Ubicación Actual"; } 
                        finally { inputOrigen.classList.remove('input-loading'); }
                    },
                    function(error) { inputOrigen.classList.remove('input-loading'); inputOrigen.placeholder = "Escribe tu dirección..."; },
                    opcionesGPS
                );
            }
        }

        function cargarHistorial() {
            const guardado = localStorage.getItem('ultimoDestinoTaxi');
            if (guardado) {
                const datos = JSON.parse(guardado);
                const container = document.getElementById('historial-container');
                const link = document.getElementById('historial-valor');
                let nombreCorto = datos.direccion.length > 30 ? datos.direccion.substring(0, 28) + '...' : datos.direccion;
                link.innerText = nombreCorto;
                container.style.display = 'block';
                link.onclick = function() {
                    document.getElementById('input-destino').value = datos.direccion;
                    coordDestino = L.latLng(datos.lat, datos.lng);
                }
            }
        }

        function calcularPrecio() {
            const ahora = new Date();
            const hora = ahora.getHours();
            let esNoche = (hora >= 21 || hora < 7);
            let bajada = esNoche ? 1900 : 1750;
            let ficha = esNoche ? 950 : 880;
            let textoTarifa = esNoche ? "🌜 Noche" : "🌞 Día";
            document.getElementById('badge-tarifa').innerText = textoTarifa;

            let km = distanciaCalculada; 
            let calculoBruto = bajada + (km * ficha);
            let resultadoFinal = calculoBruto - (calculoBruto * 0.10);

            document.getElementById('precio-original').innerText = calculoBruto.toLocaleString('es-AR', { style: 'currency', currency: 'ARS' });
            document.getElementById('precio-final').innerText = resultadoFinal.toLocaleString('es-AR', { style: 'currency', currency: 'ARS' });
            document.getElementById('distancia-final').innerText = km.toFixed(2) + ' km';
        }

        function volverAlFormulario() {
            document.getElementById('panel-resultados').classList.remove('visible');
            document.getElementById('panel-inputs').classList.remove('hidden');
        }

        function pedirPorWhatsapp() {
            let origen = document.getElementById('input-origen').value;
            let destino = document.getElementById('input-destino').value;
            let precio = document.getElementById('precio-final').innerText;
            let numero = "5493584199122"; 
            let mensaje = `Hola! 🚖\nQuiero solicitar un taxi.\n\n📍 *Desde:* ${origen}\n🏁 *Hasta:* ${destino}\n💰 *Precio Est:* ${precio}`;
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // Init
        window.addEventListener('load', () => {
            obtenerUbicacionActual();
            cargarHistorial();
            inicializarInputs(); // Nueva función de init
        });
    </script>
</body>
</html>
