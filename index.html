<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="Calcula el precio de tu viaje en taxi en Río Cuarto al instante. Conoce rutas, distancias y pide tu viaje seguro vía WhatsApp.">
    <meta name="keywords" content="taxi, rio cuarto, cordoba, tarifas taxi, pedir taxi, viaje, transporte">
    
    <!-- Open Graph for Whatsapp / Social Media -->
    <meta property="og:title" content="TuTaxi - Río Cuarto">
    <meta property="og:description" content="Calcula el precio estimado de tu viaje al instante y pide tu taxi por WhatsApp.">
    <meta property="og:image" content="https://i.imgur.com/n17BpmL.png">
    <meta property="og:type" content="website">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192x192.png">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <title>TuTaxi - Rio Cuarto</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div id="splash-screen">
        <div id="splash-logo-container">
            <h1 style="color: white; margin-top: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">TuTaxi</h1>
        </div>
        <div id="splash-loader-container" style="display: none;">
            <div class="typing-container">
                <span id="typing-text"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="color:white; margin-top:15px; font-weight:600;">Analizando mejores rutas...</div>
    </div>

    <div id="panel-inputs" class="panel-inputs">
        <h2>Viajá con seguridad, elegí TuTaxi.</h2>
        
        <div class="input-group">
            <i class="fas fa-car input-icon"></i>
            <input type="text" id="input-origen" class="input-uber" placeholder="Obteniendo ubicación..." autocomplete="off">
        </div>

        <div class="swap-container">
            <button class="btn-swap" onclick="intercambiarUbicaciones()" title="Invertir Origen y Destino">
                <i class="fas fa-exchange-alt fa-rotate-90"></i>
            </button>
        </div>

        <div class="input-group">
            <i class="fas fa-flag-checkered input-icon"></i>
            <input type="text" id="input-destino" class="input-uber" placeholder="Ej: Terminal, Centro..." autocomplete="off">
        </div>

        <ul id="lista-compartida"></ul>

        <div id="historial-container" class="historial-box">
            <i class="fas fa-history"></i> Último: <span id="historial-valor" class="historial-link"></span>
        </div>

        <button class="btn-accion btn-calcular" onclick="procesarCalculo()">
            CALCULAR PRECIO AHORA
        </button>
        
        <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
            <div style="font-size: 0.7rem; color: #666; margin-bottom: 5px;">COBERTURA:</div>
            <div style="font-size: 0.75rem; color: #aaa;">Río Cuarto • Las Higueras • Santa Catalina</div>
        </div>
    </div>

    <div id="panel-resultados" class="panel-resultados">
        <button id="btn-minimizar" class="btn-minimizar" onclick="togglePanelResultados()">
            <i class="fas fa-chevron-down"></i>
        </button>
        <div id="panel-resultados-content" style="transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; padding: 10px; margin-bottom: 10px;">
            <div id="badge-tarifa" class="badge-tarifa" style="margin-bottom: 10px;">Cargando...</div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 5px;">
                <div style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #ccc;">VIAJE ESTIMADO</div>
                <div class="badge-discount">🔥 10% OFF PROMO</div>
            </div>
            <div id="precio-original" class="precio-tachado" style="font-size: 0.9rem; color: #888; text-decoration: line-through; margin-bottom: -5px;">$0.00</div>
            <div id="precio-final" class="precio-grande" style="font-size: 2.8rem; font-weight: 800; color: #fff; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);">$0.00</div>
            <div id="distancia-final" style="font-size: 0.9rem; font-weight: 600; margin-top: 5px; color: var(--color-principal);">0 km</div>
        </div>

        <div class="whatsapp-grid">
            <button class="btn-accion btn-whatsapp-bot" onclick="pedirPorWhatsapp('bot')">
                <i class="fas fa-robot"></i> PEDIR RÁPIDO (Bot)
            </button>
            <div class="whatsapp-human-row">
                <button class="btn-accion btn-whatsapp-human" onclick="pedirPorWhatsapp('mascota')">
                    <i class="fas fa-paw"></i> Mascota
                </button>
                <button class="btn-accion btn-whatsapp-human" onclick="pedirPorWhatsapp('pendiente')">
                    <i class="far fa-clock"></i> Programar
                </button>
            </div>
        </div>

        <button id="btn-volver" class="btn-accion btn-volver" onclick="volverAlFormulario()">VOLVER</button>
    </div>

    <div id="map"></div>

    <!-- Banner de actualización PWA -->
    <div id="update-banner">
        <div>
            <div style="font-weight: bold; font-size: 0.95rem;">¡Nueva versión!</div>
            <div style="font-size: 0.8rem; color: #ccc;">Actualiza para mejorar la app.</div>
        </div>
        <button id="btn-actualizar-app" class="btn-actualizar">Refrescar</button>
    </div>

    <div id="toast-container"></div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

    <!-- Variables de Entorno -->
    <script src="env.js"></script>
    <script src="script.js"></script>

    <!-- Service Worker Registration con Auto-Updater -->
    <script>
        let newWorker;
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Service Worker Registrado!', reg);
                    
                    reg.addEventListener('updatefound', () => {
                        // Un nuevo service worker fue descargado
                        newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            // Cuando el nuevo SW esté instalado y haya uno viejo controlando la página
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // Mostrar el banner de actualización
                                document.getElementById('update-banner').classList.add('visible');
                            }
                        });
                    });
                }).catch(err => console.error('Error registrando Service Worker', err));
                
                // Si hay un SW esperándo que nadie recargó antes
                navigator.serviceWorker.ready.then(reg => {
                    if (reg.waiting) {
                        newWorker = reg.waiting;
                        document.getElementById('update-banner').classList.add('visible');
                    }
                });
            });

            let refreshing = false;
            // Detecta cuando el nuevo SW toma el control (después de skipWaiting)
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });

            // Lógica del botón de actualizar
            document.getElementById('btn-actualizar-app').addEventListener('click', () => {
                if (newWorker) {
                    newWorker.postMessage('SKIP_WAITING');
                }
            });
        }
    </script>
</body>
</html>
