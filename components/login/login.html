<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuTaxi — Acceso Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg: #0a0a0a;
            --surface: #111;
            --border: rgba(255,255,255,0.08);
            --text: #fff;
            --muted: #666;
            --red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Grain texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* Faint radial glow behind the card */
        body::before {
            content: '';
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,215,0,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 380px;
            padding: 44px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }
        /* Top gold accent line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: var(--gold);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }
        .logo-text {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .logo-badge {
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 4px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
        }
        input {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        input:focus {
            border-color: rgba(255,215,0,0.5);
            background: rgba(255,215,0,0.03);
        }
        input::placeholder { color: var(--muted); }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.83rem;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
        }
        .error-msg.show { display: block; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-icon">🚖</div>
        <span class="logo-text">TuTaxi</span>
        <span class="logo-badge">Admin</span>
    </div>

    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresá con tu cuenta de administrador.</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@tutaxi.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btn-login" onclick="login()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Ingresar</span>
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase/env.js"></script>
<script>
    const { createClient } = supabase;
    const db = createClient(ENV.SUPABASE_URL, ENV.SUPABASE_ANON_KEY);

    // Si ya hay sesión activa, redirigir directo al admin
    db.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = 'admin.html';
    });

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('btn-login');
        const spinner  = document.getElementById('spinner');
        const btnText  = document.getElementById('btn-text');
        const errorMsg = document.getElementById('error-msg');

        if (!email || !password) {
            mostrarError('Completá email y contraseña.');
            return;
        }

        btn.disabled  = true;
        spinner.style.display = 'block';
        btnText.textContent = 'Ingresando...';
        errorMsg.classList.remove('show');

        const { error } = await db.auth.signInWithPassword({ email, password });

        if (error) {
            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Ingresar';
            mostrarError(
                error.message.includes('Invalid') ? 'Email o contraseña incorrectos.' : error.message
            );
        } else {
            window.location.href = 'admin.html';
        }
    }

    function mostrarError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('show');
    }

    // Enter key
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
