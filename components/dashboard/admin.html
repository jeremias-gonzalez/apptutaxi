<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuTaxi — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700;
            --gold-dim: rgba(255,215,0,0.1);
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --border: rgba(255,255,255,0.06);
            --text: #ffffff;
            --muted: #888;
            --green: #22c55e;
            --red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); }
        
        main { padding: 32px; max-width: 1400px; margin: 0 auto; }

        .admin-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
        }
        .stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1.8rem; font-weight: 900; color: var(--gold); }

        /* Tables & List */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .section-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 20px; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover td { background: rgba(255,255,255,0.01); }

        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
        }
        .badge-pendiente { background: rgba(255,215,0,0.1); color: var(--gold); }
        .badge-notificado { background: rgba(59,130,246,0.1); color: #60a5fa; }
        .badge-completado { background: rgba(255,255,255,0.05); color: #888; }

        .btn-assign {
            background: var(--gold); color: #000; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 800; font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
        }
        .btn-assign:hover { transform: translateY(-1px); filter: brightness(1.1); }

        /* Sidebar Driver List */
        .driver-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .driver-info { display: flex; flex-direction: column; gap: 2px; }
        .driver-name { font-weight: 700; font-size: 0.85rem; }
        .driver-status { font-size: 0.7rem; color: var(--green); display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 5px var(--green); }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.visible { display: flex; }
        .modal-content {
            background: var(--surface); border: 1px solid var(--border);
            width: 90%; max-width: 400px; border-radius: 24px; padding: 32px;
        }

        #toast {
            position: fixed; bottom: 24px; right: 24px; background: var(--surface2);
            border: 1px solid var(--border); color: #fff; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; display: none; z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.show { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-dot"></div> TuTaxi Admin</div>
    <button onclick="logout()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:700; font-size:0.8rem;">SALIR</button>
</header>

<main>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Viajes Totales</div>
            <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Choferes Online</div>
            <div class="stat-value" id="stat-online">0</div>
        </div>
    </div>

    <div class="admin-layout">
        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">Panel de Viajes</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Origen / Destino</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="viajes-tbody">
                    <!-- JS -->
                </tbody>
            </table>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">Choferes Online</h2>
            </div>
            <div id="drivers-list">
                <!-- JS -->
            </div>
        </div>
    </div>
</main>

<div id="modal-assign" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom:8px">Asignar Manualmente</h3>
        <p style="color:var(--muted); font-size:0.85rem; margin-bottom:24px">Selecciona un chofer para este viaje.</p>
        <div id="modal-drivers-list">
            <!-- JS -->
        </div>
        <button onclick="cerrarModal()" style="width:100%; margin-top:16px; background:none; border:1px solid var(--border); color:var(--muted); padding:12px; border-radius:12px; cursor:pointer; font-weight:700">CANCELAR</button>
    </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase/env.js"></script>
<script>
    // Verificación de configuración para evitar errores silenciosos
    if (typeof ENV === 'undefined') {
        console.error('CRÍTICO: No se pudo cargar supabase/env.js. Revisa la ruta.');
        alert('Error de configuración: No se encontró el archivo de entorno.');
    }

    const { createClient } = supabase;
    const db = createClient(ENV.SUPABASE_URL, ENV.SUPABASE_ANON_KEY);
    let viajeIdSeleccionado = null;


    async function cargarDatos() {
        const { data: viajes } = await db.from('viajes').select('*').order('created_at', { ascending: false }).limit(20);
        const { data: choferes } = await db.from('conductores').select('*').eq('disponible', true);

        renderViajes(viajes || []);
        renderChoferes(choferes || []);
        
        document.getElementById('stat-total').textContent = viajes?.length || 0;
        document.getElementById('stat-online').textContent = choferes?.length || 0;
    }

    function renderViajes(viajes) {
        const tbody = document.getElementById('viajes-tbody');
        tbody.innerHTML = viajes.map(v => `
            <tr>
                <td>
                    <div style="font-weight:700">${v.origen_texto?.split(',')[0]}</div>
                    <div style="font-size:0.75rem; color:var(--muted)">${v.destino_texto?.split(',')[0]}</div>
                </td>
                <td><span class="badge badge-${v.estado}">${v.estado}</span></td>
                <td>
                    ${v.estado === 'pendiente' ? `<button class="btn-assign" onclick="abrirModal('${v.id}')">ASIGNAR</button>` : '—'}
                </td>
            </tr>
        `).join('');
    }

    function renderChoferes(choferes) {
        const list = document.getElementById('drivers-list');
        list.innerHTML = choferes.map(c => `
            <div class="driver-item">
                <div class="driver-info">
                    <span class="driver-name">${c.nombre}</span>
                    <span class="driver-status"><div class="dot"></div> ONLINE</span>
                </div>
                <span style="font-size:0.7rem; color:var(--muted)">#${c.id.split('-')[0]}</span>
            </div>
        `).join('');
    }

    function abrirModal(id) {
        viajeIdSeleccionado = id;
        const modal = document.getElementById('modal-assign');
        modal.classList.add('visible');
        
        db.from('conductores').select('*').eq('disponible', true).then(({ data }) => {
            const list = document.getElementById('modal-drivers-list');
            list.innerHTML = (data || []).map(c => `
                <div class="driver-item" style="cursor:pointer; border-radius:12px" onclick="asignarChofer('${c.id}')">
                    <span class="driver-name">${c.nombre}</span>
                    <i class="fas fa-chevron-right" style="color:var(--gold)"></i>
                </div>
            `).join('') || '<p style="text-align:center; color:var(--red)">No hay choferes disponibles</p>';
        });
    }

    function cerrarModal() {
        document.getElementById('modal-assign').classList.remove('visible');
    }

    async function asignarChofer(conductorId) {
        const { error } = await db.from('viajes').update({ 
            conductor_id: conductorId, 
            estado: 'notificado',
            updated_at: new Date().toISOString()
        }).eq('id', viajeIdSeleccionado);

        if (!error) {
            showToast('Viaje asignado correctamente');
            cerrarModal();
            cargarDatos();
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function logout() {
        await db.auth.signOut();
        window.location.href = 'login.html';
    }

    db.channel('admin-realtime').on('postgres_changes', { event: '*', schema: 'public' }, () => cargarDatos()).subscribe();
    
    window.onload = async () => {
        const { data: { session } } = await db.auth.getSession();
        if (!session) window.location.href = 'login.html';
        cargarDatos();
    };
</script>
</body>
</html>
