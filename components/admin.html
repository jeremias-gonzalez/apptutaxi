<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuTaxi — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700;
            --gold-dim: rgba(255,215,0,0.12);
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --border: rgba(255,255,255,0.07);
            --text: #ffffff;
            --muted: #888;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .logo-dot {
            width: 10px; height: 10px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,215,0,0.6);
        }
        .realtime-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            color: var(--green);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .realtime-dot {
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── MAIN ── */
        main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

        /* ── STATS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stat-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
        }
        .stat-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── TARIFAS EDITOR ── */
        .section-title {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 14px;
        }
        .tarifas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }
        .tarifa-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
        }
        .tarifa-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        .tarifa-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }
        .tarifa-field label {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tarifa-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .tarifa-input:focus { border-color: var(--gold); }
        .btn-guardar {
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-guardar:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-guardar:active { transform: scale(0.98); }
        .btn-guardar:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── VIAJES TABLE ── */
        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .filter-tabs {
            display: flex;
            gap: 6px;
        }
        .filter-tab {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 6px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-tab.active, .filter-tab:hover {
            background: var(--gold-dim);
            border-color: rgba(255,215,0,0.3);
            color: var(--gold);
        }
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--surface2); }
        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 16px;
            font-size: 0.88rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-pendiente { background: rgba(251,191,36,0.12); color: #fbbf24; }
        .badge-aceptado  { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .badge-en_curso  { background: rgba(34,197,94,0.12);  color: #4ade80; }
        .badge-completado{ background: rgba(100,100,100,0.12);color: #888; }
        .badge-dia   { background: rgba(255,215,0,0.1);  color: var(--gold); }
        .badge-noche { background: rgba(99,102,241,0.12); color: #a78bfa; }

        .dir-cell { max-width: 180px; }
        .dir-main { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dir-sub  { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .price-cell { font-weight: 800; color: var(--gold); white-space: nowrap; }
        .dist-cell  { color: var(--muted); font-weight: 600; }
        .time-cell  { color: var(--muted); font-size: 0.8rem; }

        .new-row { animation: flashRow 1.5s ease-out; }
        @keyframes flashRow {
            0%   { background: rgba(255,215,0,0.15); }
            100% { background: transparent; }
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.3; }
        .empty-state p { font-size: 0.9rem; }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 24px; right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 999;
            max-width: 320px;
        }
        #toast.show { display: flex; align-items: center; gap: 10px; }
        #toast.success { border-left: 3px solid var(--green); }
        #toast.error   { border-left: 3px solid var(--red); }

        @media (max-width: 768px) {
            main { padding: 20px 16px; }
            header { padding: 14px 16px; }
            .tarifas-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            th:nth-child(4), td:nth-child(4),
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-dot"></div>
        TuTaxi <span style="color:var(--muted);font-weight:400;font-size:0.85rem;">/ Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
        <div class="realtime-pill">
            <div class="realtime-dot"></div>
            Realtime activo
        </div>
        <button onclick="logout()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#888;padding:6px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">
            Salir
        </button>
    </div>
</header>

<main>
    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Viajes hoy</div>
            <div class="stat-value" id="stat-hoy">—</div>
            <div class="stat-sub">cotizaciones</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Precio promedio</div>
            <div class="stat-value" id="stat-precio">—</div>
            <div class="stat-sub">estimado</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Distancia promedio</div>
            <div class="stat-value" id="stat-dist">—</div>
            <div class="stat-sub">km por viaje</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total viajes</div>
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-sub">histórico</div>
        </div>
    </div>

    <!-- Tarifas editor -->
    <div class="section-title">⚙️ Tarifas actuales</div>
    <div class="tarifas-grid">
        <div class="tarifa-card">
            <div class="tarifa-header">🌞 Tarifa Día</div>
            <div class="tarifa-field">
                <label>Bajada de bandera ($)</label>
                <input type="number" class="tarifa-input" id="dia-bajada" placeholder="1945">
            </div>
            <div class="tarifa-field">
                <label>Ficha / 100m ($)</label>
                <input type="number" class="tarifa-input" id="dia-ficha" placeholder="950">
            </div>
            <button class="btn-guardar" onclick="guardarTarifa('dia')" id="btn-dia">
                Guardar Tarifa Día
            </button>
        </div>
        <div class="tarifa-card">
            <div class="tarifa-header">🌜 Tarifa Noche</div>
            <div class="tarifa-field">
                <label>Bajada de bandera ($)</label>
                <input type="number" class="tarifa-input" id="noche-bajada" placeholder="2110">
            </div>
            <div class="tarifa-field">
                <label>Ficha / 100m ($)</label>
                <input type="number" class="tarifa-input" id="noche-ficha" placeholder="1050">
            </div>
            <button class="btn-guardar" onclick="guardarTarifa('noche')" id="btn-noche">
                Guardar Tarifa Noche
            </button>
        </div>
    </div>

    <!-- Viajes table -->
    <div class="table-header">
        <div class="section-title" style="margin:0">🚖 Viajes cotizados</div>
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filtrarViajes('todos', this)">Todos</button>
            <button class="filter-tab" onclick="filtrarViajes('pendiente', this)">Pendientes</button>
            <button class="filter-tab" onclick="filtrarViajes('dia', this)">Día</button>
            <button class="filter-tab" onclick="filtrarViajes('noche', this)">Noche</button>
        </div>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Origen</th>
                    <th>Destino</th>
                    <th>Precio</th>
                    <th>Distancia</th>
                    <th>Tarifa</th>
                    <th>Estado</th>
                    <th>Hora</th>
                </tr>
            </thead>
            <tbody id="viajes-tbody">
                <tr>
                    <td colspan="7">
                        <div class="empty-state">
                            <i class="fas fa-satellite-dish"></i>
                            <p>Conectando con Supabase...</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div id="toast"></div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Variables de entorno (generadas por build.js) -->
<script src="../supabase/env.js"></script>

<script>
    const { createClient } = supabase;
    const db = createClient(ENV.SUPABASE_URL, ENV.SUPABASE_ANON_KEY);

    let todosLosViajes = [];
    let filtroActual   = 'todos';

    // ─── TOAST ───────────────────────────────────────────────
    function toast(msg, tipo = 'success') {
        const el = document.getElementById('toast');
        const icon = tipo === 'success' ? '✅' : '❌';
        el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
        el.className = `show ${tipo}`;
        setTimeout(() => { el.className = ''; }, 3000);
    }

    // ─── FORMATO ─────────────────────────────────────────────
    function formatARS(n) {
        return Number(n).toLocaleString('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 });
    }
    function formatTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleString('es-AR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
    }

    // ─── RENDER TABLE ─────────────────────────────────────────
    function renderTabla(viajes, isNew = false) {
        const tbody = document.getElementById('viajes-tbody');

        if (viajes.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fas fa-car"></i><p>No hay viajes registrados todavía.</p></div></td></tr>`;
            return;
        }

        const filtrados = filtroActual === 'todos'
            ? viajes
            : viajes.filter(v => v.estado === filtroActual || v.tarifa_tipo === filtroActual);

        tbody.innerHTML = filtrados.map((v, i) => `
            <tr class="${isNew && i === 0 ? 'new-row' : ''}">
                <td class="dir-cell">
                    <div class="dir-main">${v.origen_texto || '—'}</div>
                </td>
                <td class="dir-cell">
                    <div class="dir-main">${v.destino_texto || '—'}</div>
                </td>
                <td class="price-cell">${v.precio_estimado ? formatARS(v.precio_estimado) : '—'}</td>
                <td class="dist-cell">${v.distancia_km ? Number(v.distancia_km).toFixed(2) + ' km' : '—'}</td>
                <td>
                    <span class="badge badge-${v.tarifa_tipo || 'dia'}">
                        ${v.tarifa_tipo === 'noche' ? '🌜' : '🌞'} ${v.tarifa_tipo || 'día'}
                    </span>
                </td>
                <td>
                    <span class="badge badge-${v.estado || 'pendiente'}">
                        ${v.estado || 'pendiente'}
                    </span>
                </td>
                <td class="time-cell">${formatTime(v.created_at)}</td>
            </tr>
        `).join('');
    }

    // ─── STATS ───────────────────────────────────────────────
    function actualizarStats(viajes) {
        const hoy = new Date().toDateString();
        const hoyViajes = viajes.filter(v => new Date(v.created_at).toDateString() === hoy);
        const precios = viajes.filter(v => v.precio_estimado).map(v => Number(v.precio_estimado));
        const dists = viajes.filter(v => v.distancia_km).map(v => Number(v.distancia_km));

        document.getElementById('stat-hoy').textContent   = hoyViajes.length;
        document.getElementById('stat-total').textContent = viajes.length;
        document.getElementById('stat-precio').textContent = precios.length
            ? formatARS(precios.reduce((a,b) => a+b, 0) / precios.length)
            : '—';
        document.getElementById('stat-dist').textContent = dists.length
            ? (dists.reduce((a,b) => a+b, 0) / dists.length).toFixed(1) + ' km'
            : '—';
    }

    // ─── FILTROS ─────────────────────────────────────────────
    function filtrarViajes(filtro, btn) {
        filtroActual = filtro;
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTabla(todosLosViajes);
    }

    // ─── CARGAR VIAJES ────────────────────────────────────────
    async function cargarViajes() {
        const { data, error } = await db
            .from('viajes')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(100);

        if (error) {
            console.error(error);
            toast('Error cargando viajes', 'error');
            return;
        }
        todosLosViajes = data;
        renderTabla(data);
        actualizarStats(data);
    }

    // ─── REALTIME ────────────────────────────────────────────
    db.channel('admin-viajes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'viajes' }, payload => {
            todosLosViajes.unshift(payload.new);
            renderTabla(todosLosViajes, true);
            actualizarStats(todosLosViajes);
            toast(`Nuevo viaje: ${payload.new.origen_texto?.split(',')[0]} → ${payload.new.destino_texto?.split(',')[0]}`);
        })
        .subscribe();

    // ─── TARIFAS ─────────────────────────────────────────────
    async function cargarTarifas() {
        const { data, error } = await db.from('tarifas').select('*');
        if (error || !data) return;
        data.forEach(t => {
            document.getElementById(`${t.tipo}-bajada`).value = t.bajada;
            document.getElementById(`${t.tipo}-ficha`).value  = t.ficha;
        });
    }

    async function guardarTarifa(tipo) {
        const bajada = Number(document.getElementById(`${tipo}-bajada`).value);
        const ficha  = Number(document.getElementById(`${tipo}-ficha`).value);
        const btn    = document.getElementById(`btn-${tipo}`);

        if (!bajada || !ficha) { toast('Completá ambos campos', 'error'); return; }

        btn.disabled = true;
        btn.textContent = 'Guardando...';

        const { error } = await db
            .from('tarifas')
            .update({ bajada, ficha, updated_at: new Date().toISOString() })
            .eq('tipo', tipo);

        btn.disabled = false;
        btn.textContent = `Guardar Tarifa ${tipo === 'dia' ? 'Día' : 'Noche'}`;

        if (error) {
            toast('Error al guardar tarifa', 'error');
        } else {
            toast(`Tarifa ${tipo === 'dia' ? 'día' : 'noche'} actualizada ✓`);
        }
    }

    // ─── AUTH GUARD ──────────────────────────────────────────
    async function logout() {
        await db.auth.signOut();
        window.location.href = 'login.html';
    }

    // ─── INIT ─────────────────────────────────────────────────
    window.addEventListener('load', async () => {
        // Verificar sesión activa
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return;
        }
        cargarViajes();
        cargarTarifas();
    });

    // Escuchar cambios de auth (logout desde otra pestaña)
    db.auth.onAuthStateChange((event) => {
        if (event === 'SIGNED_OUT') window.location.href = 'login.html';
    });
</script>
</body>
</html>
